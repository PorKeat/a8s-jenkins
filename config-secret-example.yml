---
# Copy this file to config-secret.yml and fill in the real values.

jenkins_admin_username: "replace-me"
jenkins_admin_password: "replace-me"

# Optional: if you later switch jenkins_reverse_proxy_tls_mode to "provided",
# store the origin certificate and private key here instead of config.yml.
jenkins_reverse_proxy_provided_certificate: |
  replace-me
jenkins_reverse_proxy_provided_private_key: |
  replace-me

jenkins_string_credentials:
  - id: sonarqube-token
    description: sonarqube-token
    secret: "replace-me"
  - id: DEFECTDOJO
    description: DefectDojo API token or secret text
    secret: "replace-me"
  - id: registry-url
    description: Registry URL
    secret: "replace-me"
  - id: registry-repository
    description: Registry repository
    secret: "replace-me"
  - id: gitops-repo-url
    description: GitOps repository URL
    secret: "replace-me"
  - id: infra-repo-url
    description: Infrastructure repository URL
    secret: "replace-me"
  - id: infra-repo-url-micro
    description: Microservices infrastructure repository URL
    secret: "replace-me"
  - id: registry-repository-micro
    description: Microservices registry repository
    secret: "replace-me"
  - id: gitops-repo-url-micro
    description: Microservices GitOps repository URL
    secret: "replace-me"
  - id: register-url-micro
    description: Microservices registry URL
    secret: "replace-me"
  - id: a8s-admin-registry-repository
    description: Admin registry repository
    secret: "replace-me"
  - id: a8s-admin-github-token
    description: a8s-admin-github-token
    secret: "replace-me"
  - id: a8s-frontend-chart-credential
    description: a8s-frontend-chart-credential
    secret: "replace-me"
  - id: a8s-backend-chart-credential
    description: a8s-backend-chart-credential
    secret: "replace-me"

jenkins_file_credentials:
  - id: a8s-frontend-env
    description: a8s-frontend-env
    content: "replace-me"

jenkins_scm_token_default_username: "replace-me"
jenkins_scm_token_credentials:
  - id: a8s-backend-credential
    description: SCM credential for a8s-backend and a8s-admin
    token: "replace-me"
  - id: a8s-frontend-credential
    description: SCM credential for a8s-frontend
    token: "replace-me"

jenkins_username_password_credentials:
  - id: registry-credentials
    description: Container registry credential
    username: "replace-me"
    password: "replace-me"
  - id: DOCKERHUB-CREDENTIAL
    description: Docker Hub credential
    username: "replace-me"
    password: "replace-me"
  - id: infra-repo-creds
    description: Infrastructure repository credential
    username: "replace-me"
    password: "replace-me"
  - id: dockerhub-credentials-micro
    description: Microservices Docker Hub credential
    username: "replace-me"
    password: "replace-me"
  - id: gitops-micro-creds
    description: Microservices GitOps credential
    username: "replace-me"
    password: "replace-me"
  - id: a8s-admin-registry-credentials
    description: a8s-admin-registry-credentials
    username: "replace-me"
    password: "replace-me"

jenkins_ssh_private_key_credentials:
  - id: gitops-ssh
    description: Monolithic GitOps
    username: git
    private_key: |
      -----BEGIN OPENSSH PRIVATE KEY-----
      replace-me
      -----END OPENSSH PRIVATE KEY-----
  - id: trivy
    description: Trivy SSH build agent credential
    username: enz
    private_key: |
      -----BEGIN OPENSSH PRIVATE KEY-----
      replace-me
      -----END OPENSSH PRIVATE KEY-----
