---
jenkins_target_host: "34.87.139.220"
jenkins_target_user: "github-actions"
jenkins_target_port: 22
jenkins_target_python_interpreter: "/usr/bin/python3"
jenkins_target_ssh_private_key_file: "~/.ssh/github-actions-key"
jenkins_target_ssh_common_args: "-o IdentitiesOnly=yes"

jenkins_release_channel: "lts"
jenkins_url: "https://jenkins.autonomous-istad.com"

# Local service settings on the Jenkins host.
jenkins_http_port: 8080
jenkins_wait_host: "127.0.0.1"
jenkins_wait_timeout: 300
jenkins_java_package: openjdk-17-jre
jenkins_java_opts: "-Djenkins.install.runSetupWizard=false"

# Controller configuration.
jenkins_system_message: "Managed by Ansible for the Jenkins host behind jenkins.autonomous-istad.com."
jenkins_controller_executors: 2
jenkins_agent_port: 50000

# Non-secret admin profile metadata.
jenkins_admin_full_name: "Autonomous Istad Jenkins Admin"
jenkins_admin_email: "alexkgm2412@gmail.com"

# Agent documented in the setup notes.
jenkins_agents:
  - name: trivy
    label: trivy
    executors: 1
    remote_fs: /home/enz/jenkins
    description: Used by the image build, scan, and push stage in the shared deploy pipeline.
    mode: NORMAL
    web_socket: false

# Repository-backed pipeline jobs documented in the setup notes.
jenkins_pipeline_jobs:
  - name: a8s-backend
    description: Managed pipeline job for the a8s-backend repository.
    repo_url: https://github.com/ITProfessional-Gen01/a8s-backend.git
    branch: main
    script_path: Jenkinsfile
    credential_id: a8s-backend-credential
    github_push: true
    lightweight: true
  - name: a8s-frontend
    description: Managed pipeline job for the a8s-frontend repository.
    repo_url: https://github.com/ITProfessional-Gen01/a8s-frontend.git
    branch: main
    script_path: Jenkinsfile
    credential_id: a8s-frontend-credential
    github_push: true
    lightweight: true
  - name: a8s-admin
    description: Managed pipeline job for the a8s-admin repository.
    repo_url: https://github.com/ITProfessional-Gen01/a8s-admin.git
    branch: main
    script_path: Jenkinsfile
    credential_id: a8s-backend-credential
    github_push: true
    lightweight: true

