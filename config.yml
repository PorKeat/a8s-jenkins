# Agent documented in the setup notes.
jenkins_agents:
  - name: trivy
    label: trivy
    executors: 1
    remote_fs: /home/enz/jenkins
    description: Used by the image build, scan, and push stage in the shared deploy pipeline.
    mode: NORMAL
    launcher:
      type: ssh
      host: 34.143.195.220
      port: 22
      credentials_id: trivy
      ssh_host_key_verification_strategy: knownHostsFileKeyVerificationStrategy
      launch_timeout_seconds: 60
      max_num_retries: 10
      retry_wait_time: 15

# Jenkins jobs are defined in pipeline/jobs.yml.
# SCM-backed jobs keep their repository URL, branch, credentials, and script path there.
# Only inline jobs, like deploy-pipeline, use local pipeline/*.groovy files.
