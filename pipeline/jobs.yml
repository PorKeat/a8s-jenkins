---
# Jobs under jenkins_pipeline_jobs are created in Jenkins as:
# Definition -> Pipeline script from SCM
# Only jenkins_inline_pipeline_jobs use local pipeline/*.groovy files.
jenkins_pipeline_jobs:
  - name: a8s-backend
    description: Imported from the legacy Jenkins SCM pipeline job.
    repo_url: https://github.com/ITProfessional-Gen01/a8s-backend.git
    branch: main
    script_path: Jenkinsfile
    credential_id: a8s-backend-credential
    github_push: true
    lightweight: true
  - name: a8s-frontend
    description: Imported from the legacy Jenkins SCM pipeline job.
    repo_url: https://github.com/ITProfessional-Gen01/a8s-frontend.git
    branch: main
    script_path: Jenkinsfile
    credential_id: a8s-frontend-credential
    github_push: true
    lightweight: true
  - name: a8s-admin
    description: Imported from the legacy Jenkins SCM pipeline job.
    repo_url: https://github.com/ITProfessional-Gen01/a8s-admin.git
    branch: main
    script_path: Jenkinsfile
    credential_id: a8s-backend-credential
    github_push: true
    lightweight: true
  - name: deploy-microservices
    description: Imported from the legacy Jenkins SCM pipeline job.
    repo_url: https://github.com/Vuthy-Tourn/platform-infra-testing
    branch: main
    script_path: jenkins/Jenkinsfile-microservices
    lightweight: true
    days_to_keep: -1
    num_to_keep: 30
    disable_concurrent_builds: false
    parameters:
      - type: string
        name: USER_ID
        description: Tenant user ID
      - type: string
        name: WORKSPACE_ID
        description: Workspace ID / slug
      - type: string
        name: PROJECT_NAME
        default: workspace-stack
        description: Workspace-level stack name written to GitOps
      - type: string
        name: PLATFORM_DOMAIN
        default: autonomous-istad.com
        description: Wildcard platform domain
      - type: string
        name: GITOPS_BRANCH
        default: main
        description: GitOps branch to update
      - type: string
        name: SERVICE_JOB_NAME
        default: deploy-service-test
        description: Jenkins job name used to deploy one service
      - type: string
        name: SERVICES_JSON
        default: "[]"
        description: JSON array of service descriptors
      - type: boolean
        name: ENABLE_GITOPS_UPDATE
        default: true
        description: Update GitOps repository once after all service builds succeed
      - type: boolean
        name: ROLLBACK_MODE
        default: false
        description: Roll back all services to saved image tags
      - type: boolean
        name: DESTROY_MODE
        default: false
        description: Remove this microservice project from GitOps and tear down its runtime resources
  - name: deploy-service-test
    description: Imported from the legacy Jenkins SCM pipeline job.
    repo_url: https://github.com/Vuthy-Tourn/platform-infra-testing
    branch: main
    script_path: jenkins/Jenkinsfile
    lightweight: true
    days_to_keep: -1
    num_to_keep: 50
    disable_concurrent_builds: false
    parameters:
      - type: string
        name: REPO_URL
        description: Git repository URL from user (GitHub/GitLab)
      - type: string
        name: BRANCH
        default: main
        description: Git branch to build
      - type: string
        name: USER_ID
        description: Tenant user id
      - type: string
        name: WORKSPACE_ID
        description: Workspace id/slug for GitOps path partitioning and Kubernetes namespace
      - type: string
        name: PROJECT_NAME
        description: Project slug
      - type: string
        name: APP_NAME
        description: Legacy alias for PROJECT_NAME
      - type: string
        name: IMAGE_TAG
        description: Optional image tag provided by backend (deploy or rollback)
      - type: string
        name: FRAMEWORK
        description: Optional framework override provided by backend
      - type: string
        name: REPO_CREDENTIALS_ID
        description: Optional Jenkins credential id for private user repositories
      - type: boolean
        name: ENABLE_TRIVY_SCAN
        default: true
        description: Run local Trivy image scan
      - type: boolean
        name: ROLLBACK_MODE
        default: false
        description: Skip build/scan/push and update GitOps with a saved image tag

jenkins_inline_pipeline_jobs:
  - name: deploy-pipeline
    description: Imported from the legacy Jenkins inline pipeline job.
    pipeline_file: pipeline/deploy-pipeline.groovy
    days_to_keep: -1
    num_to_keep: 50
    disable_concurrent_builds: false
    parameters:
      - type: string
        name: REPO_URL
        description: Git repository URL from user (GitHub/GitLab)
      - type: string
        name: BRANCH
        default: main
        description: Git branch to build
      - type: string
        name: USER_ID
        description: Tenant user id
      - type: string
        name: WORKSPACE_ID
        description: Workspace namespace, for example ns-username-1234abcd
      - type: string
        name: CUSTOM_DOMAIN
        description: "Optional custom host (example: app.example.com)"
      - type: string
        name: PROJECT_NAME
        description: Project slug
      - type: string
        name: APP_NAME
        description: Legacy alias for PROJECT_NAME
      - type: string
        name: APP_PORT
        default: "3000"
        description: Container application port
      - type: string
        name: PLATFORM_DOMAIN
        default: apps.example.com
        description: Wildcard platform domain
      - type: string
        name: GITOPS_BRANCH
        default: main
        description: GitOps branch to update
      - type: string
        name: REPO_CREDENTIALS_ID
        description: Optional Jenkins credential id for private user repositories
      - type: string
        name: SONARQUBE_SERVER_NAME
        default: sonarqube
        description: Jenkins SonarQube server configuration name
      - type: string
        name: SONARQUBE_SCANNER_TOOL
        description: Optional Jenkins SonarScanner tool name; empty uses sonar-scanner from PATH
      - type: boolean
        name: ENABLE_SONARQUBE_SCAN
        default: true
        description: Run SonarQube source analysis
      - type: boolean
        name: ENABLE_SONARQUBE_QUALITY_GATE
        default: false
        description: Wait for SonarQube quality gate before build
      - type: boolean
        name: ENABLE_TRIVY_SCAN
        default: false
        description: Run local Trivy image scan
      - type: boolean
        name: ENABLE_GITOPS_UPDATE
        default: true
        description: Update GitOps repository after push
      - type: boolean
        name: DOMAIN_ONLY_UPDATE
        default: false
        description: Only update GitOps domain host (skip checkout/build/push)
  - name: check-credentials
    description: Helper pipeline to show the current Jenkins credential values or placeholders.
    pipeline_file: pipeline/check-credentials.groovy
    days_to_keep: -1
    num_to_keep: 20
    disable_concurrent_builds: true

jenkins_placeholder_jobs: []

jenkins_shared_libraries:
  - name: share_lib
    default_version: master
    implicit: false
    allow_version_override: true
    include_in_changesets: true
    remote: https://github.com/chengdevith/share-lib.git
    remote_name: origin
    raw_refspecs: "+refs/heads/*:refs/remotes/origin/*"
    includes: "*"
    excludes: ""
  - name: a8s-sonarqube
    default_version: main
    implicit: false
    allow_version_override: true
    include_in_changesets: true
    remote: https://github.com/tochratana/a8s-sonarqube.git
    remote_name: origin
    raw_refspecs: "+refs/heads/*:refs/remotes/origin/*"
    includes: "*"
    excludes: ""
