---
jenkins_install: true
jenkins_state: present
jenkins_service_name: jenkins
jenkins_home: /var/lib/jenkins
jenkins_http_port: 8080
jenkins_url: http://127.0.0.1:8080
jenkins_local_url: "http://127.0.0.1:{{ jenkins_http_port }}"
jenkins_wait_host: 127.0.0.1
jenkins_wait_timeout: 300
jenkins_reverse_proxy_enabled: false
jenkins_reverse_proxy_server_name: localhost
jenkins_reverse_proxy_tls_mode: disabled
jenkins_reverse_proxy_http_redirect_to_https: false
jenkins_reverse_proxy_tls_cert_path: /etc/ssl/certs/jenkins-origin.crt
jenkins_reverse_proxy_tls_key_path: /etc/ssl/private/jenkins-origin.key
jenkins_reverse_proxy_provided_certificate: ""
jenkins_reverse_proxy_provided_private_key: ""
jenkins_reverse_proxy_self_signed_valid_days: 825
jenkins_reverse_proxy_destroy_package: false

jenkins_release_channel: weekly
jenkins_java_package: openjdk-21-jre
jenkins_java_home: /usr/lib/jvm/java-21-openjdk-amd64
jenkins_java_opts: "-Djenkins.install.runSetupWizard=false"
jenkins_apt_keyring_path: /etc/apt/keyrings/jenkins-keyring.asc
jenkins_apt_key_url: "{{ 'https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key' if jenkins_release_channel == 'lts' else 'https://pkg.jenkins.io/debian/jenkins.io-2026.key' }}"
jenkins_apt_repository_base_url: "{{ 'https://pkg.jenkins.io/debian-stable' if jenkins_release_channel == 'lts' else 'https://pkg.jenkins.io/debian' }}"
jenkins_plugin_manifest_path: "{{ jenkins_home }}/plugins.txt"
jenkins_plugin_cli_command: jenkins-plugin-cli
jenkins_plugin_manager_version: "2.14.0"
jenkins_plugin_manager_download_url: "https://github.com/jenkinsci/plugin-installation-manager-tool/releases/download/{{ jenkins_plugin_manager_version }}/jenkins-plugin-manager-{{ jenkins_plugin_manager_version }}.jar"
jenkins_plugin_manager_jar_path: "/usr/local/lib/jenkins-plugin-manager-{{ jenkins_plugin_manager_version }}.jar"
jenkins_plugin_manager_cache_dir: "{{ jenkins_home }}/.cache/jenkins-plugin-management-cli"
jenkins_plugin_manager_local_cache_path: "{{ lookup('env', 'TMPDIR') | default('/tmp', true) }}/jenkins-plugin-manager-{{ jenkins_plugin_manager_version }}.jar"
jenkins_plugin_manager_download_timeout: 120
jenkins_plugin_manager_download_retries: 3
jenkins_plugin_manager_download_delay: 5
jenkins_war_path: /usr/share/java/jenkins.war
jenkins_destroy_data: true
jenkins_destroy_java: false

jenkins_system_message: Managed by Ansible from the autonomous-istad Jenkins setup notes.
jenkins_controller_executors: 2
jenkins_agent_port: 50000
jenkins_sonar_scanner_installations: []

jenkins_admin_username: "replace-me"
jenkins_admin_password: "replace-me"
jenkins_admin_full_name: Jenkins Admin
jenkins_admin_email: jenkins@example.com

jenkins_plugins:
  - name: configuration-as-code
  - name: job-dsl
  - name: ant
  - name: build-timeout
  - name: dark-theme
  - name: email-ext
  - name: gradle
  - name: workflow-aggregator
  - name: workflow-cps
  - name: workflow-job
  - name: workflow-multibranch
  - name: pipeline-build-step
  - name: pipeline-graph-view
  - name: pipeline-github-lib
  - name: pipeline-model-definition
  - name: pipeline-groovy-lib
  - name: git
  - name: git-client
  - name: github
  - name: github-api
  - name: github-branch-source
  - name: credentials
  - name: credentials-binding
  - name: ldap
  - name: matrix-auth
  - name: matrix-project
  - name: ssh-credentials
  - name: ssh-slaves
  - name: sonar
    version: 2.18.2
  - name: sonar-quality-gates
    version: "364.v67a_f255f340f"
  - name: theme-manager
  - name: timestamper
  - name: ws-cleanup

jenkins_agents:
  - name: trivy
    label: trivy
    executors: 1
    remote_fs: /home/enz/jenkins
    description: Used by the image build, scan, and push stage in the shared deploy pipeline.
    mode: NORMAL
    launcher:
      type: inbound
      web_socket: false

jenkins_manage_jobs: true
jenkins_pipeline_jobs:
  - name: a8s-backend
    description: Managed pipeline job for the a8s-backend repository.
    repo_url: https://github.com/ITProfessional-Gen01/a8s-backend.git
    branch: main
    script_path: Jenkinsfile
    credential_id: a8s-backend-credential
    github_push: true
    lightweight: true
  - name: a8s-frontend
    description: Managed pipeline job for the a8s-frontend repository.
    repo_url: https://github.com/ITProfessional-Gen01/a8s-frontend.git
    branch: main
    script_path: Jenkinsfile
    credential_id: a8s-frontend-credential
    github_push: true
    lightweight: true
  - name: a8s-admin
    description: Managed pipeline job for the a8s-admin repository.
    repo_url: https://github.com/ITProfessional-Gen01/a8s-admin.git
    branch: main
    script_path: Jenkinsfile
    credential_id: a8s-backend-credential
    github_push: true
    lightweight: true

jenkins_placeholder_jobs: []

jenkins_inline_pipeline_jobs: []
jenkins_shared_libraries: []

jenkins_string_credentials:
  - id: sonarqube-token
    description: SonarQube token
    secret: ""

jenkins_file_credentials: []
jenkins_scm_token_default_username: replace-me
jenkins_scm_token_credentials: []
jenkins_credentials_overwrite_existing: false

jenkins_username_password_credentials:
  - id: a8s-backend-credential
    description: SCM credential for a8s-backend
    username: ""
    password: ""
  - id: a8s-frontend-credential
    description: SCM credential for a8s-frontend
    username: ""
    password: ""

jenkins_ssh_private_key_credentials:
  - id: gitops-ssh
    description: Monolithic GitOps SSH credential
    username: git
    private_key: ""
