---
- name: reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: restart jenkins
  ansible.builtin.service:
    name: "{{ jenkins_service_name }}"
    state: restarted
  listen: restart jenkins

- name: wait for jenkins
  ansible.builtin.wait_for:
    host: "{{ jenkins_wait_host }}"
    port: "{{ jenkins_http_port }}"
    timeout: "{{ jenkins_wait_timeout }}"
    delay: 5
  listen: restart jenkins

- name: reload nginx
  ansible.builtin.service:
    name: nginx
    state: reloaded
  listen: reload nginx

- name: restart nginx
  ansible.builtin.service:
    name: nginx
    state: restarted
  listen: restart nginx
