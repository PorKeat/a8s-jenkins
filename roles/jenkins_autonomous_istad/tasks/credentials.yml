---
- name: Seed Jenkins credentials while preserving manual Jenkins values
  community.general.jenkins_script:
    script: "{{ lookup('template', 'credentials.groovy.j2') }}"
    url: "{{ jenkins_local_url }}"
    user: "{{ jenkins_admin_username }}"
    password: "{{ jenkins_admin_password }}"
  register: jenkins_credentials_seed
  changed_when: "'CHANGED' in jenkins_credentials_seed.output"

