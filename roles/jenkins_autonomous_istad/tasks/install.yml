---
- name: Install Jenkins package prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - fontconfig
      - gnupg
      - "{{ jenkins_java_package }}"
    state: present
    update_cache: true

- name: Ensure the Jenkins apt keyrings directory exists
  ansible.builtin.file:
    path: "{{ jenkins_apt_keyring_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add Jenkins apt keyring
  ansible.builtin.get_url:
    url: "{{ jenkins_apt_key_url }}"
    dest: "{{ jenkins_apt_keyring_path }}"
    mode: "0644"

- name: Add Jenkins apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ jenkins_apt_keyring_path }}] {{ jenkins_apt_repository_base_url }} binary/"
    filename: jenkins
    state: present
    update_cache: true

- name: Install Jenkins
  ansible.builtin.apt:
    name: jenkins
    state: present
    update_cache: true

- name: Ensure the systemd override directory exists before first startup
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ jenkins_service_name }}.service.d"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure bootstrap Jenkins systemd override before first startup
  ansible.builtin.template:
    src: jenkins-override.conf.j2
    dest: "/etc/systemd/system/{{ jenkins_service_name }}.service.d/override.conf"
    owner: root
    group: root
    mode: "0644"
  vars:
    jenkins_casc_config_enabled: false

- name: Reload systemd so the bootstrap Jenkins override is active
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Reset failed Jenkins service state before startup
  ansible.builtin.command: "systemctl reset-failed {{ jenkins_service_name }}"
  changed_when: false
  failed_when: false

- name: Ensure Jenkins service is enabled and restarted for plugin installation
  ansible.builtin.service:
    name: "{{ jenkins_service_name }}"
    enabled: true
    state: restarted

- name: Wait for Jenkins HTTP port before plugin installation
  ansible.builtin.wait_for:
    host: "{{ jenkins_wait_host }}"
    port: "{{ jenkins_http_port }}"
    timeout: "{{ jenkins_wait_timeout }}"
    delay: 5
