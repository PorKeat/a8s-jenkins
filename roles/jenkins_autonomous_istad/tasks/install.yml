---
- name: Install Jenkins package prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - fontconfig
      - gnupg
      - openssh-client
      - "{{ jenkins_java_package }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure the Jenkins apt keyrings directory exists
  ansible.builtin.file:
    path: "{{ jenkins_apt_keyring_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add Jenkins apt keyring
  ansible.builtin.get_url:
    url: "{{ jenkins_apt_key_url }}"
    dest: "{{ jenkins_apt_keyring_path }}"
    mode: "0644"

- name: Add Jenkins apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ jenkins_apt_keyring_path }}] {{ jenkins_apt_repository_base_url }} binary/"
    filename: jenkins
    state: present
    update_cache: true

- name: Install Jenkins
  ansible.builtin.apt:
    name: jenkins
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Check whether yq is already installed
  ansible.builtin.stat:
    path: "{{ jenkins_yq_binary_path }}"
  register: jenkins_yq_binary_stat
  when: jenkins_install_yq | bool

- name: Install yq for Jenkins pipelines
  ansible.builtin.get_url:
    url: "{{ jenkins_yq_download_url }}"
    dest: "{{ jenkins_yq_binary_path }}"
    owner: root
    group: root
    mode: "0755"
  when: jenkins_install_yq | bool
    and not jenkins_yq_binary_stat.stat.exists
