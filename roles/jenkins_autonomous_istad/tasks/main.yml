---
- name: Validate role inputs
  ansible.builtin.import_tasks: validate.yml

- name: Load dynamic JSON configurations
  ansible.builtin.import_tasks: dynamic_configs.yml

- name: Install Jenkins
  ansible.builtin.import_tasks: install.yml
  when:
    - jenkins_state == 'present'
    - jenkins_install | bool

- name: Install Jenkins plugins
  ansible.builtin.import_tasks: plugins.yml
  when: jenkins_state == 'present'

- name: Prepare Jenkins controller SSH assets for managed agents
  ansible.builtin.import_tasks: agents.yml
  when:
    - jenkins_state == 'present'
    - jenkins_seed_agents | default(false) | bool

- name: Apply Jenkins Configuration as Code
  ansible.builtin.import_tasks: jcasc.yml
  when: jenkins_state == 'present'

- name: Preapprove managed unsandboxed pipeline scripts
  ansible.builtin.import_tasks: script-approval.yml
  when:
    - jenkins_state == 'present'
    - jenkins_seed_scripts_approval | default(false) | bool

- name: Seed managed Jenkins jobs without overwriting manual job changes
  ansible.builtin.import_tasks: jobs.yml
  when:
    - jenkins_state == 'present'
    - jenkins_seed_jobs | default(false) | bool

- name: Seed Jenkins credentials without overwriting manual values
  ansible.builtin.import_tasks: credentials.yml
  when:
    - jenkins_state == 'present'
    - jenkins_seed_credentials | default(false) | bool

- name: Configure Jenkins shared libraries
  ansible.builtin.import_tasks: libraries.yml
  when:
    - jenkins_state == 'present'
    - jenkins_seed_shared_libraries | default(false) | bool

- name: Configure Jenkins reverse proxy
  ansible.builtin.import_tasks: proxy.yml
  when:
    - jenkins_state == 'present'
    - jenkins_reverse_proxy_enabled | bool

- name: Remove Jenkins
  ansible.builtin.import_tasks: uninstall.yml
  when: jenkins_state == 'absent'
