---
- name: Ensure the Jenkins plugins directory exists
  ansible.builtin.file:
    path: "{{ jenkins_home }}/plugins"
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0755"

- name: Discover plugin archives already present on disk
  ansible.builtin.find:
    paths: "{{ jenkins_home }}/plugins"
    patterns:
      - "*.jpi"
      - "*.hpi"
    recurse: false
    file_type: file
  register: jenkins_existing_plugin_archives

- name: Build the installed plugin name list
  ansible.builtin.set_fact:
    jenkins_installed_plugin_names: >-
      {{
        jenkins_existing_plugin_archives.files
        | map(attribute='path')
        | map('basename')
        | map('regex_replace', '\\.(jpi|hpi)$', '')
        | list
      }}

- name: Install required Jenkins plugins
  community.general.jenkins_plugin:
    name: "{{ item.name }}"
    version: "{{ item.version | default(omit) }}"
    jenkins_home: "{{ jenkins_home }}"
    url: "{{ jenkins_local_url }}"
    url_username: "{{ jenkins_admin_username }}"
    url_password: "{{ jenkins_admin_password }}"
    force_basic_auth: true
    with_dependencies: "{{ item.with_dependencies | default(true) }}"
    state: present
  loop: "{{ jenkins_plugins }}"
  when: item.name not in jenkins_installed_plugin_names
  notify: restart jenkins
